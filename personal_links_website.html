<!DOCTYPE html>
<html lang="en">
<head>

      background: #0f172a;

      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      background: #1e293b;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);

    img {
      width: 120px;
      height: 120px;
      border-radius: 15px;
      margin-bottom: 15px;
    }

    h1 {
      margin-bottom: 20px;
    }

    a {
      display: block;
      margin: 10px 0;
      padding: 12px;
      text-decoration: none;
      color: white;
      border-radius: 10px;
      transition: 0.3s;
      font-weight: bold;
    }

    .youtube { background: #ff0000; }
    .discord { background: #5865F2; }
    .roblox { background: #111827; }

    a:hover {
      transform: scale(1.05);
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="PUFFI9677777.png" alt="Logo">

    <a class="youtube" href="https://www.youtube.com/@NotBen111" target="_blank">YouTube</a>
